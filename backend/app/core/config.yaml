project:
  name: GitExplore
  version: 1.0.0
  seed: 42

ingestion:

  supported_extensions:
    # Core languages
    - .py
    - .js
    - .ts
    - .jsx
    - .tsx
    - .java
    - .go
    - .rs
    - .cpp
    - .cc
    - .cxx
    - .c
    - .h
    - .hpp
    - .cs
    - .php
    - .rb
    - .swift
    - .kt
    - .scala
    - .r
    - .lua
    - .dart

    # Frontend / web
    - .html
    - .css
    - .scss
    - .sass
    - .less

    # Config / infra
    - .json
    - .yaml
    - .yml
    - .toml
    - .ini
    - .env
    - .conf

    # Shell / scripts
    - .sh
    - .bash
    - .zsh
    - .ps1
    - .bat

    # Docs / text
    - .txt
    - .md
    - .rst

    # SQL
    - .sql

    # Special extensionless files
    - dockerfile
    - makefile
    - procfile

  skip_dirs:
    - .git
    - .github
    - .idea
    - .vscode

    - node_modules
    - vendor
    - target
    - build
    - dist
    - out

    - __pycache__
    - .pytest_cache
    - .mypy_cache

    - venv
    - .venv
    - env

    - coverage
    - htmlcov

    - logs
    - tmp
    - temp

    - migrations

    - .next
    - .nuxt

    - public/build

  skip_files:
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml

    - poetry.lock
    - Pipfile.lock

    - .DS_Store
    - Thumbs.db

  max_size_file: 500_000

  language_detection:

    # Python
    .py: python

    # JavaScript / TypeScript
    .js: javascript
    .jsx: javascriptreact
    .ts: typescript
    .tsx: typescriptreact

    # JVM
    .java: java
    .kt: kotlin
    .scala: scala

    # Systems
    .go: go
    .rs: rust
    .c: c
    .h: c
    .cpp: cpp
    .cc: cpp
    .cxx: cpp
    .hpp: cpp

    # Microsoft
    .cs: csharp

    # Web
    .html: html
    .css: css
    .scss: scss
    .sass: sass
    .less: less

    # Backend
    .php: php
    .rb: ruby

    # Mobile
    .swift: swift
    .dart: dart

    # Data / config
    .json: json
    .yaml: yaml
    .yml: yaml
    .toml: toml
    .ini: ini
    .env: env

    # Shell
    .sh: shell
    .bash: shell
    .zsh: shell
    .ps1: powershell
    .bat: batch

    # Docs
    .txt: text
    .md: markdown
    .rst: rst

    # Database
    .sql: sql

    # Infra
    dockerfile: dockerfile
    makefile: makefile
    procfile: procfile

chunking:
  strategy: "ast"
  fallback_chunk_size: 1200
  fallback_overlap: 20
  max_chunk_tokens: 1000
  min_chunk_length: 50
  max_tokens: 400
  overlap_tokens: 32

embedding:
  provider: "sentence_transformers"
  model_name: "nomic-ai/nomic-embed-code"
  batch_size: 16
  normalize: true
  size: 768

vector_db:
  host: "localhost"
  port: 6333
  collection_name: "gitexplore"
  top_k: 30

tiktoken:
  name: "cl100k_base"

bm25:
  top_k: 30

hybrid:
  rrf_k: 60
  final_top_k: 20

reranker:
  model_name: "rerank-v3.5"
  top_k: 8

retrieval:
  query_expansion:
    enabled: true
    max_terms: 12
  structural_expansion:
    max_depth: 1
    max_related_chunks: 8
  architecture:
    bm25_top_k: 40
    dense_top_k: 40
    rerank_top_k: 12
    context_budget_tokens: 1800
    expanded_related_limit: 12
    expansion_depth: 2

query:
  classify: true
  types:
    - explain_code
    - find_function
    - debug
    - architecture
  model_name: "llama-3.1-8b-instant"

generation:
  provider: "groq"
  model_name: "llama-3.1-8b-instant"
  temperature: 0.2
  num_predict: 1024
  context_budget_tokens: 1000
  conversation_history_turns: 1
  max_retries: 2
  retry_delay_seconds: 1.25

judge:
  provider: "groq"
  model_name: "llama-3.1-8b-instant"
  temperature: 0.0
  num_predict: 256
  max_retries: 2
  retry_delay_seconds: 1.25

graph:
  enabled: true
  hop_depth: 1
  trigger_on:
    - architecture
    - explain_code

self_eval:
  enabled: true
  threshold: 0.6
  eval_model: "mistral:7b"

evaluation:
  metrics:
    - recall@5
    - precision@5
    - mrr@10
  compare_modes:
    - dense_only
    - bm25_only
    - hybrid

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  save_logs: true
  name: gitexplore
